    <div class="modal-overlay" id="imageModal" onclick="closeModal()">
        <span class="modal-close">&times;</span>
        <button class="modal-nav modal-prev" onclick="event.stopPropagation(); prevImage()">
            <span>&#10094;</span>
        </button>
        <img class="modal-content" id="modalImage" alt="Immagine ingrandita" onclick="event.stopPropagation()">
        <button class="modal-nav modal-next" onclick="event.stopPropagation(); nextImage()">
            <span>&#10095;</span>
        </button>
        <div class="modal-counter" id="modalCounter"></div>
    </div>

    <script>
        // Variabili 
        let currentGalleryImages = [];
        let currentImageIndex = 0;

       
        document.addEventListener('DOMContentLoaded', function() {
            
            const galleries = [
                { selector: '.messina-gallery', name: 'Messina' },
                { selector: '.novara-loc-gallery', name: 'Novara Brochure' },
                { selector: '.novara-gallery', name: 'Novara Foto' }
            ];

            
            galleries.forEach(gallery => {
                const images = document.querySelectorAll(gallery.selector);
                const imageArray = Array.from(images).map(img => img.src);

                images.forEach((img, index) => {
                    img.style.cursor = 'pointer';
                    img.addEventListener('click', function() {
                        openModalWithGallery(imageArray, index);
                    });
                });
            });

     
            const modalImg = document.getElementById('modalImage');
            if (modalImg) {
                modalImg.addEventListener('click', function(e) {
                    e.stopPropagation();
                });
            }
        });

        function openModalWithGallery(galleryImages, startIndex) {
            const modal = document.getElementById('imageModal');
            const modalImg = document.getElementById('modalImage');
            
            if (modal && modalImg) {
                currentGalleryImages = galleryImages;
                currentImageIndex = startIndex;
                
                modal.style.display = 'flex';
                modalImg.src = galleryImages[startIndex];
                updateCounter();
                document.body.style.overflow = 'hidden';
            }
        }

        function closeModal() {
            const modal = document.getElementById('imageModal');
            
            if (modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        function nextImage() {
            currentImageIndex = (currentImageIndex + 1) % currentGalleryImages.length;
            updateModalImage();
        }

        function prevImage() {
            currentImageIndex = (currentImageIndex - 1 + currentGalleryImages.length) % currentGalleryImages.length;
            updateModalImage();
        }

        function updateModalImage() {
            const modalImg = document.getElementById('modalImage');
            if (modalImg && currentGalleryImages[currentImageIndex]) {
                modalImg.src = currentGalleryImages[currentImageIndex];
                updateCounter();
            }
        }

        function updateCounter() {
            const counter = document.getElementById('modalCounter');
            if (counter) {
                counter.textContent = `${currentImageIndex + 1} / ${currentGalleryImages.length}`;
            }
        }

        
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imageModal');
            if (modal && modal.style.display === 'flex') {
                if (event.key === 'Escape') {
                    closeModal();
                } else if (event.key === 'ArrowRight') {
                    nextImage();
                } else if (event.key === 'ArrowLeft') {
                    prevImage();
                }
            }
        });
    </script>
